version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: hello-boujii-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: hello_boujii
    volumes:
      - mongodb_data:/data/db
      - ./server/config/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - hello-boujii-network

  redis:
    image: redis:7.2-alpine
    container_name: hello-boujii-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hello-boujii-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hello-boujii-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/hello_boujii?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - hello-boujii-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hello-boujii-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - hello-boujii-network

volumes:
  mongodb_data:
  redis_data:

networks:
  hello-boujii-network:
    driver: bridge
